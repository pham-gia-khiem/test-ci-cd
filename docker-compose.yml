services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interview_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: interview_shop
      DB_DROP_SCHEMA: "false"
      JWT_ACCESS_SECRET: access-secret
      JWT_REFRESH_SECRET: refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      CHOKIDAR_USEPOLLING: "true"
      SEED_DATA: "true"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        VITE_API_URL: /api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: /api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4173:4173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
